[build]
  base    = "."
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://allwin-backend-production.up.railway.app/api/v1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from   = "/"
  to     = "/cripto"
  status = 302
